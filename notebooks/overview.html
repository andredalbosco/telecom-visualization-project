  <script id="2" type="module" pinned="">
    const data = await d3.dsv(";", '/data/dpt2020.csv', row => ({
      sex: row.sexe === "1" ? "male" : row.sexe === "2" ? "female" : row.sexe,
      first_name: row.preusuel,
      birth_year: row.annais === "XXXX" ? null : +row.annais,
      department: row.dpt,
      count: +row.nombre,
      is_rare_name: row.preusuel === "_PRENOMS_RARES",
      is_unknown_department: row.dpt === "XX"
    }));

    const dataWithName = data.filter(d => !d.is_rare_name);
    const dataWithYear = data.filter((d) => d.birth_year != null);
  </script>
  <script id="3" type="module" pinned="">
    Inputs.table(d3.shuffle(data.slice()).slice(0, 1000))
  </script>
  <script id="4" type="text/markdown">
    ## Births per year
  </script>
  <script id="5" type="module" pinned="">
    const birthCountPerYear = Array.from(
      d3.rollup(dataWithYear, rows => d3.sum(rows, d => d.count), d => d.birth_year),
      ([birth_year, count]) => ({birth_year, count})
    ).sort((a, b) => d3.ascending(a.birth_year, b.birth_year));
  </script>
  <script id="6" type="module" pinned="">
    Plot.plot({
      width: 760,
      height: 420,
      marginLeft: 70,
      x: {label: "Year", tickFormat: "d"},
      y: {label: "Birth count", grid: true},
      marks: [
        Plot.ruleY([0]),
        Plot.lineY(birthCountPerYear, {x: "birth_year", y: "count", strokeWidth: 1}),
      ]
    })
  </script>
  <script id="7" type="text/markdown">
    ## Unique names per year
  </script>
  <script id="8" type="module" pinned="">
    const uniqueNameCountPerYear = Array.from(
      d3.rollup(
        dataWithName.filter(d => d.birth_year != null),
        rows => new Set(rows.map(d => d.first_name)).size,
        d => d.birth_year
      ),
      ([birth_year, count]) => ({birth_year, count})
    ).sort((a, b) => d3.ascending(a.birth_year, b.birth_year));
  </script>
  <script id="9" type="module" pinned="">
    Plot.plot({
      x: {label: "Year", tickFormat: "d"},
      y: {label: "Unique birth names", grid: true},
      marks: [
        Plot.lineY(uniqueNameCountPerYear, {x: "birth_year", y: "count"}),
        Plot.ruleY([0]),
      ]
    })
  </script>
  <script id="10" type="text/markdown">
    ## Top names
  </script>
  <script id="11" type="module" pinned="">
    const nameCounts = Array.from(
      d3.rollup(dataWithName, rows => d3.sum(rows, d => d.count), d => d.first_name),
      ([first_name, count]) => ({first_name, count})
    )
    const topNames = nameCounts
      .sort((a, b) => d3.descending(a.count, b.count))
      .slice(0, 10);
  </script>
  <script id="12" type="module" pinned="">
    Inputs.table(topNames)
  </script>

        Plot.barY(topNames, {

          y: "count",

          fill: "steelblue",

    })

  </script>

  <script id="16" type="module" pinned="">
    vl.render({
      spec: {
        width: 680,
        height: 320,
        data: {values: topNames},
        mark: {type: "bar", color: "steelblue"},
        encoding: {
          y: {
            field: "first_name",
            type: "nominal",
            sort: "-x",
            title: null
          },
          x: {
            field: "count",
            type: "quantitative",
            title: "Birth count"
          },
          tooltip: [
            {field: "first_name", type: "nominal", title: "Name"},
            {field: "count", type: "quantitative", title: "Birth count", format: ","}
          ]
        }
      },
    })
  </script>
  <script id="19" type="application/vnd.observable.javascript" pinned="">

          vl.tooltip().field("count").type("quantitative").title("Birth count").format(",")
        ])
